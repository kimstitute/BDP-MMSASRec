USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp

data_path: /workspace/BDP/Datasets

load_col:
  inter: [user_id, item_id, timestamp]
  item: [item_id, img_feat]

selected_features: [img_feat]
numerical_features: [img_feat]
pooling_mode: mean

eval_args:
  split: {'LS': 'valid_and_test'}
  order: TO
  mode: uni100
repeatable: True

seed: 2020
reproducibility: False

MAX_ITEM_LIST_LENGTH: 20
train_neg_sample_args: ~

learner: adam
learning_rate: 0.001
train_batch_size: 3072
eval_batch_size: 8192
epochs: 20
eval_step: 2
stopping_step: 3

metrics: ['Recall', 'MRR', 'NDCG', 'Hit']
topk: [5, 10, 20]
valid_metric: Recall@10
valid_metric_bigger: True

worker: 16
enable_amp: True
enable_scaler: True
save_dataset: True

n_layers: 2
n_heads: 2
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE
